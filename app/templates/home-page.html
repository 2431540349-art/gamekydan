{% extends "layout.html" %}

{% block title %}CYBER SHIELD{% endblock %}

{% block content %}
<section class="home-hero">
    <div class="hero-header">
        <div class="hero-badge">Nghị định 13/2023/NĐ-CP</div>
        <span class="hero-shield" aria-hidden="true">🛡️</span>
    </div>

    <div class="hero-actions">
        <a href="/lobby" class="btn btn-primary btn-lg">Chơi ngay</a>
    </div>

    <div class="team-mountain" aria-label="Đội hình người chơi">
        <div class="mountain-row mountain-row-top">
            <div class="mountain-player">
                <span>👤</span>
                <strong>Đàn</strong>
            </div>
        </div>
        <div class="mountain-row mountain-row-mid">
            <div class="mountain-player">
                <span>👤</span>
                <strong>Hân</strong>
            </div>
            <div class="mountain-player">
                <span>👤</span>
                <strong>Phúc</strong>
            </div>
        </div>
        <div class="mountain-row mountain-row-base">
            <div class="mountain-player">
                <span>👤</span>
                <strong>Tuyết</strong>
            </div>
            <div class="mountain-player">
                <span>👤</span>
                <strong>Linh</strong>
            </div>
            <div class="mountain-player">
                <span>👤</span>
                <strong>Quỳnh</strong>
            </div>
        </div>
    </div>
</section>
{% endblock %}
