{% extends "layout.html" %}

{% block title %}Đăng nhập{% endblock %}

{% block content %}
<section class="home-hero" style="max-width: 420px; margin: 2rem auto;">
    <h1 style="font-size: 1.5rem; margin-bottom: 1rem;">Đăng nhập</h1>
    <form action="{{ url_for('main.auth.login') }}" method="post" class="hero-room-form">
        <div class="input-group">
            <label for="username">Tên đăng nhập</label>
            <input id="username" name="username" class="input-field" type="text" required>
        </div>
        <div class="input-group">
            <label for="password">Mật khẩu</label>
            <input id="password" name="password" class="input-field" type="password" required>
        </div>
        <label style="display:flex; gap:0.5rem; align-items:center; margin: 0.75rem 0;">
            <input type="checkbox" name="remember">
            Ghi nhớ đăng nhập
        </label>
        <button type="submit" class="btn btn-primary btn-lg">Đăng nhập</button>
    </form>
    <p style="margin-top: 1rem;">
        Chưa có tài khoản? <a href="{{ url_for('main.auth.register_page') }}">Đăng ký</a>
    </p>
</section>
{% endblock %}
