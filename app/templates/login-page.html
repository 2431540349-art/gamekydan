{% extends "layout.html" %}

{% block title %}Đăng nhập - DataGuard VN{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="card auth-card card-glass">
        <h1>Đăng nhập</h1>
        
        <form action="{{ url_for('main.auth.login') }}" method="POST">
            <div class="input-group">
                <label for="username">Tên đăng nhập</label>
                <input type="text" id="username" name="username" class="input-field" required autofocus>
            </div>
            
            <div class="input-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" name="password" class="input-field" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block btn-lg mt-2">Đăng nhập</button>
        </form>
        
        <p class="text-center mt-2" style="font-size: 0.9rem; color: var(--text-secondary);">
            Chưa có tài khoản? <a href="/register" style="color: var(--primary); font-weight: 600; text-decoration: none;">Đăng ký ngay</a>
        </p>
    </div>
</div>
{% endblock %}
